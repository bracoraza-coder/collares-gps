<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collares GPS - Comparador de Localizadores de Mascotas</title>
  <!-- Lucide Icons via CDN for standard vanilla rendering of icons if needed, but we can also use Lucide icons in JS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.330.0/font/lucide.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">
  <div id="app" class="flex flex-col min-h-screen">

    <div class="flex items-center justify-center min-h-screen bg-slate-50">

        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
        <p class="mt-4 text-slate-600 font-medium">Cargando comparador de collares GPS...</p>

    </div>
  </div>

</html>
